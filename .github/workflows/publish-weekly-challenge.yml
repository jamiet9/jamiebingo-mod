name: Publish Weekly Challenge

on:
  schedule:
    - cron: '15 15 * * 4'
  workflow_dispatch:

jobs:
  publish-weekly:
    runs-on: ubuntu-latest
    env:
      WEEKLY_PUBLISH_URL: ${{ secrets.JAMIEBINGO_WEEKLY_PUBLISH_URL }}
      WEEKLY_API_KEY: ${{ secrets.JAMIEBINGO_WEEKLY_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate publish configuration
        run: |
          test -n "$WEEKLY_PUBLISH_URL"
          test -n "$WEEKLY_API_KEY"

      - name: Generate weekly payload
        run: |
          ./gradlew runWeeklyChallengeExport > weekly-export.log
          python - <<'PY'
          import json
          from pathlib import Path

          lines = [line.strip() for line in Path("weekly-export.log").read_text(encoding="utf-8").splitlines() if line.strip()]
          payload = json.loads(lines[-1])
          Path("weekly-payload.json").write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          print(f"challengeId={payload['challengeId']}")
          print(f"baseSeed={payload['baseSeed']}")
          PY

      - name: Publish weekly payload
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $WEEKLY_API_KEY" \
            --data @weekly-payload.json \
            "$WEEKLY_PUBLISH_URL"